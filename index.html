<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href='data:application/manifest+json,{"name":"AI Python Editor","short_name":"AI Editor","display":"standalone","background_color":"#1e1e1e","theme_color":"#1e1e1e"}'>
    <title>Mobile Python AI Editor</title>
    
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/darcula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/hint/show-hint.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/dialog/dialog.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/hint/anyword-hint.min.js"></script>
    
    <!-- アドオン -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/search/searchcursor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/search/search.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/dialog/dialog.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/comment/comment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/edit/closebrackets.min.js"></script>

    <!-- Pyodide & JSZip -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #2d2d2d;
            --text-color: #d4d4d4;
            --accent-blue: #007acc;
            --accent-green: #2ea043;
            --border-color: #444;
        }
        body {
            margin: 0; padding: 8px;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; height: 100dvh; box-sizing: border-box;
            overflow: hidden;
        }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-shrink: 0; }
        h1 { font-size: 16px; margin: 0; color: #fff; text-align: center; flex-grow: 1; }
        .btn-icon { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0; color: #fff; }
        
        input[type="text"] {
            width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 6px;
            background-color: var(--panel-bg); color: #fff;
            border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; flex-shrink: 0;
        }
        
        .editor-tools-container { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; flex-shrink: 0; }
        .editor-tools { display: flex; gap: 5px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; padding-bottom: 2px; }
        .editor-tools::-webkit-scrollbar { display: none; }
        .editor-tools button {
            flex-shrink: 0; padding: 6px 12px; font-size: 14px; font-family: monospace; font-weight: bold;
            background-color: #444; color: #eee; border-radius: 4px; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .editor-tools button:active { opacity: 0.8; background-color: #555; }
        .editor-tools button.btn-special { background-color: #385166; color: #fff; font-family: inherit; font-size: 13px;}

        .main-layout { display: flex; flex-grow: 1; overflow: hidden; position: relative; margin-bottom: 6px; }
        
        .sidebar {
            position: absolute; z-index: 100; left: 0; top: 0; height: 100%; transform: translateX(-110%);
            width: 240px; background-color: var(--panel-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 10px; box-sizing: border-box;
            transition: transform 0.3s ease; overflow-y: auto; flex-shrink: 0; box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .sidebar-header h3 { font-size: 13px; margin: 0; color: #bbb; }
        .sidebar-header .btn-icon { color: var(--accent-blue); font-size: 24px; font-weight: bold; }
        
        .sidebar button.btn-action, .setting-panel button.btn-action {
            width: 100%; padding: 8px; margin-bottom: 5px; background: #444; color: #fff;
            border: none; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold;
        }
        .sidebar button.btn-action:hover, .setting-panel button.btn-action:hover { background: #555; }
        
        .file-tree { flex-grow: 1; overflow-y: auto; }
        .file-item {
            padding: 8px 6px; font-size: 13px; cursor: pointer; border-radius: 4px; margin-bottom: 2px;
            display: flex; justify-content: space-between; align-items: center; word-break: break-all;
        }
        .file-item:hover, .file-item.active { background: #555; border-left: 3px solid var(--accent-blue); }
        .file-item-actions { display: flex; flex-shrink: 0; }
        
        .sidebar-overlay {
            display: none; position: absolute; z-index: 90; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .sidebar-overlay.show { display: block; }

        .editor-area { display: flex; flex-direction: column; flex-grow: 1; width: 100%; height: 100%; overflow: hidden; }
        .editor-tabs { display: flex; gap: 2px; overflow-x: auto; margin-bottom: 0; scrollbar-width: none; flex-shrink: 0; }
        .editor-tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 8px 8px 8px 12px; background: #333; border-radius: 6px 6px 0 0; font-size: 13px;
            cursor: pointer; white-space: nowrap; border: 1px solid var(--border-color); border-bottom: none;
            color: #aaa; display: flex; align-items: center; gap: 5px;
        }
        .tab.active { background: #2b2b2b; color: #fff; border-top: 2px solid var(--accent-blue); }
        .tab .close-btn {
            margin-left: 4px; font-size: 14px; color: #888; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%;
        }
        .tab .close-btn:hover { background: #555; color: #fff; }
        
        .CodeMirror {
            width: 100%; flex-grow: 1; height: 100%; box-sizing: border-box;
            border: 1px solid var(--border-color); border-top: none; border-radius: 0 8px 8px 8px;
            font-family: ui-monospace, "Courier New", Courier, monospace; font-size: 14px; z-index: 0;
        }
        .CodeMirror-hints { background: var(--panel-bg); border: 1px solid var(--border-color); color: #fff; font-size: 14px; z-index: 6000; }
        .CodeMirror-hint { color: #ccc; }
        .CodeMirror-hint-active { background: var(--accent-blue); color: #fff; }
        .CodeMirror-dialog { background: var(--panel-bg); color: #fff; padding: 8px; z-index: 1001; border-bottom: 1px solid var(--border-color); }
        .CodeMirror-dialog input { background: #1e1e1e; color: #fff; border: 1px solid #555; padding: 4px; border-radius: 4px; }
        
        .controls { display: flex; gap: 8px; margin-bottom: 6px; flex-shrink: 0; }
        .controls button { flex: 1; padding: 12px; font-size: 14px; font-weight: bold; border: none; border-radius: 8px; color: white; cursor: pointer; }
        .btn-run { background-color: var(--accent-blue); }
        .btn-ai { background-color: var(--accent-green); }
        .controls button:active { opacity: 0.8; transform: scale(0.98); }
        
        .output-container {
            height: 22%; min-height: 80px; flex-shrink: 0; background-color: #000;
            border: 1px solid var(--border-color); border-radius: 8px; padding: 10px;
            overflow-y: auto; font-family: monospace; font-size: 13px; white-space: pre-wrap; word-wrap: break-word; color: #fff;
        }
        .status { font-size: 12px; color: #888; margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 3px;}
        
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); }
        .modal-content {
            background-color: var(--panel-bg); margin: 5% auto; padding: 20px;
            border: 1px solid #555; width: 95%; max-width: 500px; border-radius: 8px; box-sizing: border-box; max-height: 90vh; overflow-y: auto;
        }
        .modal-content h2 { margin-top: 0; font-size: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .modal-content label { display: block; margin-top: 15px; font-size: 13px; color: #bbb; font-weight: bold; }
        .modal-content input, .modal-content select, .modal-content textarea.setting-area {
            width: 100%; padding: 10px; margin-top: 5px; background: #1e1e1e; color: #fff;
            border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; font-size: 14px;
        }
        
        .settings-tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; overflow-x: auto; scrollbar-width: none; }
        .settings-tabs::-webkit-scrollbar { display: none; }
        .settings-tabs button { background: transparent; border: none; color: #aaa; padding: 8px 10px; cursor: pointer; font-size: 13px; border-radius: 4px; white-space: nowrap; }
        .settings-tabs button.active { color: var(--accent-blue); background: #333; font-weight: bold; }
        
        .modal-btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn-group button { padding: 12px; flex: 1; border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 14px; font-weight: bold;}
        
        #toast {
            visibility: hidden; min-width: 200px; background-color: #333; color: #fff;
            text-align: center; border-radius: 20px; padding: 10px 20px; position: fixed;
            z-index: 4000; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 13px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s, bottom 0.3s;
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
        .loader {
            display: inline-block; width: 12px; height: 12px; border: 2px solid #fff; border-bottom-color: transparent;
            border-radius: 50%; animation: rotation 1s linear infinite; margin-right: 5px; vertical-align: middle;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .floating-menu {
            display: none; position: fixed; z-index: 5000;
            background: rgba(45, 45, 45, 0.95); border: 1px solid var(--border-color); border-radius: 8px;
            padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.7); grid-template-columns: repeat(3, 1fr); gap: 8px;
            width: 280px; backdrop-filter: blur(5px);
        }
        .floating-menu button {
            background: #444; color: #fff; border: none; padding: 10px 5px;
            border-radius: 4px; font-size: 14px; font-family: monospace; cursor: pointer; font-weight: bold;
        }
        .floating-menu button:active { background: var(--accent-blue); }
    </style>
</head>
<body>

    <div class="header-container">
        <button class="btn-icon" onclick="toggleSidebar()" title="ワークスペース">📁</button>
        <h1>📱 Mobile Python & AI</h1>
        <button class="btn-icon" onclick="openSettings()" title="設定">⚙️</button>
    </div>

    <input type="text" id="ai-prompt" placeholder="✨ AIに指示 (例: 1から10まで足すコードを書いて)">
    
    <div class="editor-tools-container">
        <div class="editor-tools">
            <button onclick="smartTab()" title="Tab/Indent">Tab</button>
            <button onclick="insertWrap('(', ')')">()</button>
            <button onclick="insertWrap('[', ']')">[]</button>
            <button onclick="insertWrap('{', '}')">{}</button>
            <button onclick="insertWrap('\'', '\'')">''</button>
            <button onclick="insertWrap('\"', '\"')">""</button>
            <button onclick="insertText(':')">:</button>
            <button onclick="insertText('=')">=</button>
        </div>
        <div class="editor-tools">
            <button onclick="toggleComment()"># コメント</button>
            <button onclick="insertComment('# AI: ')" class="btn-special"># AI指示</button>
            <button onclick="formatCode()" class="btn-special" title="PEP8で整形">✨ 整形</button>
            <button onclick="execSearch()">🔍 検索</button>
            <button onclick="execReplace()">🔄 置換</button>
            <button onclick="undo()" title="元に戻す">↩️</button>
            <button onclick="redo()" title="やり直し">↪️</button>
        </div>
    </div>

    <div class="main-layout">
        <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

        <!-- ワークスペース (サイドバー) -->
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>📁 ワークスペース</h3>
                <button class="btn-icon" onclick="closeSidebar()" title="閉じる">✖</button>
            </div>
            <div style="display:flex; gap:5px; margin-bottom: 5px;">
                <button class="btn-action" onclick="createNewFile()" style="background-color: var(--accent-blue); padding: 8px; flex:1;">＋ ファイル</button>
                <button class="btn-action" onclick="createNewFolder()" style="background-color: #555; padding: 8px; flex:1;">＋ フォルダ</button>
            </div>
            <div id="file-tree" class="file-tree"></div>
        </div>

        <div class="editor-area">
            <div id="editor-tabs" class="editor-tabs"></div>
            <textarea id="code" autocapitalize="off" autocomplete="off" spellcheck="false" autocorrect="off"></textarea>
        </div>
    </div>

    <div class="controls">
        <button class="btn-run" onclick="runPython()">▶ 実行する</button>
        <button class="btn-ai" id="btn-ai" onclick="askAI()">✨ AIに頼む</button>
    </div>

    <div class="output-container">
        <div class="status" id="status-text">システム: 初期化中...</div>
        <div id="output"></div>
    </div>

    <div id="toast"></div>

    <div id="floating-keyword-menu" class="floating-menu">
        <button onclick="insertKeywordAdvanced('def')">def</button>
        <button onclick="insertKeywordAdvanced('class')">class</button>
        <button onclick="insertKeywordAdvanced('if')">if</button>
        <button onclick="insertKeywordAdvanced('elif')">elif</button>
        <button onclick="insertKeywordAdvanced('else')">else</button>
        <button onclick="insertKeywordAdvanced('for')">for</button>
        <button onclick="insertKeywordAdvanced('while')">while</button>
        <button onclick="insertKeywordAdvanced('return')">return</button>
        <button onclick="insertKeywordAdvanced('import')">import</button>
        <button onclick="insertKeywordAdvanced('from')">from</button>
        <button onclick="insertKeywordAdvanced('True')">True</button>
        <button onclick="insertKeywordAdvanced('False')">False</button>
        <button onclick="insertKeywordAdvanced('None')">None</button>
        <button onclick="insertKeywordAdvanced('self')">self</button>
        <button onclick="insertKeywordAdvanced('print')">print()</button>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2>⚙️ システム設定</h2>
            
            <div class="settings-tabs">
                <button id="tab-btn-ai" class="active" onclick="switchSettingTab('ai')">AI設定</button>
                <button id="tab-btn-pip" onclick="switchSettingTab('pip')">pip</button>
                <button id="tab-btn-env" onclick="switchSettingTab('env')">.env</button>
                <button id="tab-btn-data" onclick="switchSettingTab('data')">データ管理</button>
            </div>

            <div id="setting-ai" class="setting-panel">
                <label>AIプロバイダー / モデル</label>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <select id="setting-model" style="flex:1;">
                        <option value="gemini-2.5-flash">Gemini-2.5-flash (推奨/高速)</option>
                        <option value="gemini-1.5-pro">Gemini-1.5-pro</option>
                        <option value="gpt-4o">GPT-4o</option>
                        <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
                        <option value="grok-beta">Grok</option>
                    </select>
                </div>
                <input type="text" id="setting-custom-model" placeholder="カスタムモデル名を直接入力（優先）" style="margin-top:5px;">
                <label>APIキー (IndexedDBに安全にローカル保存)</label>
                <input type="password" id="setting-apikey" placeholder="AI API Keyを入力">
                <label>システムプロンプト / 役割設定</label>
                <textarea id="setting-system-prompt" class="setting-area" rows="4"></textarea>
            </div>

            <div id="setting-pip" class="setting-panel" style="display:none;">
                <p style="font-size:12px; color:#aaa; margin-top:0;">1行に1つのパッケージ名を入力。Python実行前に自動インストールされます。</p>
                <textarea id="setting-pip-packages" class="setting-area" rows="6" placeholder="numpy&#10;pandas&#10;requests"></textarea>
            </div>

            <div id="setting-env" class="setting-panel" style="display:none;">
                <p style="font-size:12px; color:#aaa; margin-top:0;">KEY=VALUE の形式で入力。Python実行時に <code>os.environ</code> にロードされます。</p>
                <textarea id="setting-env-vars" class="setting-area" rows="6" placeholder="API_KEY=your_secret_key&#10;DEBUG=True"></textarea>
            </div>

            <div id="setting-data" class="setting-panel" style="display:none;">
                <label>ローカルフォルダ連携 (FSAA)</label>
                <p style="font-size:11px; color:#aaa; margin-top:0;">ブラウザが対応している場合、端末内のフォルダを直接編集できます。</p>
                <button class="btn-action" onclick="openDirectory()" style="padding: 12px;">📂 ローカルフォルダを開く</button>
                
                <label style="margin-top:20px;">インポート / エクスポート</label>
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <button class="btn-action" onclick="importData()" style="padding: 12px; margin-bottom:0;">📂 インポート</button>
                    <button class="btn-action" onclick="exportData()" style="padding: 12px; margin-bottom:0; background: var(--accent-blue);">💾 ZIP保存</button>
                </div>
                
                <label style="margin-top:20px;">履歴データ管理</label>
                <button class="btn-action" onclick="clearHistory()" style="padding: 12px; background:#a33;">🗑 履歴データをすべて削除</button>
            </div>

            <div class="modal-btn-group">
                <button onclick="saveSettings()" style="background: var(--accent-blue);">設定を保存</button>
                <button onclick="closeSettings()" style="background: #555;">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        let codeEditorInstance;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        let wakeLock = null;
        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
        function releaseWakeLock() {
            if (wakeLock !== null) wakeLock.release().then(() => wakeLock = null);
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('show'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }

        function switchSettingTab(tabId) {
            document.querySelectorAll('.setting-panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.settings-tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById('setting-' + tabId).style.display = 'block';
            document.getElementById('tab-btn-' + tabId).classList.add('active');
        }
        function openSettings() { document.getElementById('settings-modal').style.display = 'block'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

        function smartTab() {
            if (!codeEditorInstance) return;
            codeEditorInstance.somethingSelected() ? codeEditorInstance.execCommand("indentMore") : codeEditorInstance.replaceSelection("    ");
            codeEditorInstance.focus();
        }
        function insertText(text) { if(codeEditorInstance) { codeEditorInstance.replaceSelection(text); codeEditorInstance.focus(); } }
        function insertWrap(start, end) {
            if (!codeEditorInstance) return;
            const sel = codeEditorInstance.getSelection();
            if (sel) codeEditorInstance.replaceSelection(start + sel + end);
            else {
                const pos = codeEditorInstance.getCursor();
                codeEditorInstance.replaceRange(start + end, pos);
                codeEditorInstance.setCursor({line: pos.line, ch: pos.ch + start.length});
            }
            codeEditorInstance.focus();
        }
        function insertComment(text) {
            if (!codeEditorInstance) return;
            const sel = codeEditorInstance.getSelection();
            if (sel && text.trim() === '#') codeEditorInstance.replaceSelection(sel.split('\n').map(l => '# ' + l).join('\n'));
            else {
                const pos = codeEditorInstance.getCursor();
                codeEditorInstance.replaceSelection(pos.ch === 0 ? text : '\n' + text);
            }
            codeEditorInstance.focus();
            showToast("AI指示用コメントを挿入しました");
        }
        function undo() { if(codeEditorInstance) codeEditorInstance.undo(); }
        function redo() { if(codeEditorInstance) codeEditorInstance.redo(); }
        function execSearch() { if(codeEditorInstance) codeEditorInstance.execCommand("find"); }
        function execReplace() { if(codeEditorInstance) codeEditorInstance.execCommand("replace"); }
        function toggleComment() { if(codeEditorInstance) codeEditorInstance.execCommand("toggleComment"); }

        let longPressTimer, touchStartX, touchStartY;
        function onTouchStart(e) {
            if (e.touches.length > 1) return;
            touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
            longPressTimer = setTimeout(() => { showKeywordMenu(touchStartX, touchStartY); }, 500);
        }
        function onTouchMove(e) {
            if (!touchStartX || !touchStartY) return;
            if (Math.abs(e.touches[0].clientX - touchStartX) > 10 || Math.abs(e.touches[0].clientY - touchStartY) > 10) clearTimeout(longPressTimer);
        }
        function onTouchEnd() { clearTimeout(longPressTimer); }
        function showKeywordMenu(x, y) {
            const menu = document.getElementById('floating-keyword-menu');
            menu.style.display = 'grid';
            let menuX = Math.max(10, x - 140); 
            if (menuX + 280 > window.innerWidth) menuX = window.innerWidth - 290;
            menu.style.left = menuX + 'px'; menu.style.top = Math.max(y + 20, 50) + 'px';
            if (navigator.vibrate) navigator.vibrate(50);
        }
        function insertKeywordAdvanced(type) {
            if (!codeEditorInstance) return;
            let text = type, offset = 0;
            switch(type) {
                case 'def': text = "def ():"; offset = -3; break;
                case 'class': text = "class :"; offset = -1; break;
                case 'if': text = "if :"; offset = -1; break;
                case 'elif': text = "elif :"; offset = -1; break;
                case 'else': text = "else:"; break;
                case 'for': text = "for  in :"; offset = -5; break;
                case 'while': text = "while :"; offset = -1; break;
                case 'return': text = "return "; break;
                case 'import': text = "import "; break;
                case 'from': text = "from  import "; offset = -8; break;
                case 'print': text = "print()"; offset = -1; break;
            }
            codeEditorInstance.replaceSelection(text);
            if (offset !== 0) { const p = codeEditorInstance.getCursor(); codeEditorInstance.setCursor({ line: p.line, ch: p.ch + offset }); }
            codeEditorInstance.focus(); closeKeywordMenu();
        }
        function closeKeywordMenu() { document.getElementById('floating-keyword-menu').style.display = 'none'; }
        document.addEventListener('touchstart', (e) => { const m = document.getElementById('floating-keyword-menu'); if (m.style.display === 'grid' && !m.contains(e.target)) closeKeywordMenu(); }, {passive: true});
        document.addEventListener('mousedown', (e) => { const m = document.getElementById('floating-keyword-menu'); if (m.style.display === 'grid' && !m.contains(e.target)) closeKeywordMenu(); });

        let db;
        let appSettings = { model: 'gemini-2.5-flash', customModel: '', apiKey: '', systemPrompt: 'あなたはプロのPythonエンジニアです。簡潔で正確なコードを提供し、ユーザーの指示に従ってください。', pipPackages: '', envVars: '' };
        
        function initDB() {
            return new Promise((resolve) => {
                const req = indexedDB.open('AIPythonEditorDB', 2);
                req.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('settings')) database.createObjectStore('settings', { keyPath: 'id' });
                    if (!database.objectStoreNames.contains('history')) database.createObjectStore('history', { keyPath: 'id', autoIncrement: true });
                };
                req.onsuccess = (e) => { db = e.target.result; loadSettings(); loadVirtualFiles(); resolve(); };
                req.onerror = () => resolve();
            });
        }
        function loadSettings() {
            if (!db) return;
            try {
                const tx = db.transaction('settings', 'readonly');
                tx.objectStore('settings').get('user_settings').onsuccess = (e) => {
                    if (e.target.result) {
                        appSettings = { ...appSettings, ...e.target.result.data };
                        document.getElementById('setting-model').value = appSettings.model;
                        document.getElementById('setting-custom-model').value = appSettings.customModel || '';
                        document.getElementById('setting-apikey').value = appSettings.apiKey;
                        document.getElementById('setting-system-prompt').value = appSettings.systemPrompt;
                        document.getElementById('setting-pip-packages').value = appSettings.pipPackages || '';
                        document.getElementById('setting-env-vars').value = appSettings.envVars || '';
                    }
                };
            } catch (err) {}
        }
        function saveSettings() {
            appSettings.model = document.getElementById('setting-model').value;
            appSettings.customModel = document.getElementById('setting-custom-model').value;
            appSettings.apiKey = document.getElementById('setting-apikey').value;
            appSettings.systemPrompt = document.getElementById('setting-system-prompt').value;
            appSettings.pipPackages = document.getElementById('setting-pip-packages').value;
            appSettings.envVars = document.getElementById('setting-env-vars').value;
            if (db) db.transaction('settings', 'readwrite').objectStore('settings').put({ id: 'user_settings', data: appSettings });
            showToast('設定を保存しました'); closeSettings();
        }

        // --- フォルダ・ファイル管理 ---
        let dirHandle = null;
        let files = []; 
        let activeFileIndex = -1;
        let autoSaveTimer;

        function loadVirtualFiles() {
            if (!db) return defaultFilesInit();
            const tx = db.transaction('settings', 'readonly');
            tx.objectStore('settings').get('virtual_files').onsuccess = (e) => {
                const res = e.target.result;
                if (res && res.data && res.data.length > 0) {
                    files = res.data.map(f => ({
                        type: f.type || 'file', name: f.name, path: f.path || '/' + f.name,
                        content: f.content || '', handle: null, isDirty: false,
                        isOpen: f.isOpen !== false, isExpanded: !!f.isExpanded
                    }));
                } else defaultFilesInit();
                
                const openIdx = files.findIndex(f => f.type === 'file' && f.isOpen);
                activeFileIndex = openIdx >= 0 ? openIdx : -1;
                switchFile(activeFileIndex);
                renderSidebar();
            };
            tx.objectStore('settings').get('virtual_files').onerror = defaultFilesInit;
        }

        function defaultFilesInit() {
            files = [{ type: 'file', name: 'main.py', path: '/main.py', content: '# ここにPythonコードを書きます\nprint("スマホからこんにちは！")\n', handle: null, isDirty: false, isOpen: true }];
            activeFileIndex = 0; switchFile(0);
        }

        function saveVirtualFiles() {
            if (!db) return;
            const tx = db.transaction('settings', 'readwrite');
            const dataToSave = files.map(f => ({
                type: f.type || 'file', name: f.name, path: f.path || '/' + f.name, content: f.content || '',
                isOpen: f.isOpen !== false, isExpanded: !!f.isExpanded
            }));
            tx.objectStore('settings').put({ id: 'virtual_files', data: dataToSave });
        }

        async function saveCurrentFile() {
            if (activeFileIndex < 0 || !files[activeFileIndex] || files[activeFileIndex].type !== 'file') return;
            const file = files[activeFileIndex];
            file.content = codeEditorInstance.getValue();
            
            if (file.handle) {
                try {
                    const opts = { mode: 'readwrite' };
                    if ((await file.handle.queryPermission(opts)) !== 'granted') await file.handle.requestPermission(opts);
                    const writable = await file.handle.createWritable();
                    await writable.write(file.content);
                    await writable.close();
                    file.isDirty = false;
                } catch (e) { console.error("FSAA Save Error:", e); }
            } else file.isDirty = false;
            
            renderTabs(); saveVirtualFiles();
        }

        async function scanDirectory(dh, currentPath = '') {
            for await (const entry of dh.values()) {
                const itemPath = currentPath + '/' + entry.name;
                if (entry.kind === 'file') {
                    if (entry.name.match(/\.(py|txt|md|json|env|csv)$/) || entry.name === 'requirements.txt') {
                        const file = await entry.getFile();
                        files.push({ type: 'file', name: entry.name, path: itemPath, content: await file.text(), handle: entry, isDirty: false, isOpen: false });
                    }
                } else if (entry.kind === 'directory') {
                    files.push({ type: 'folder', name: entry.name, path: itemPath, handle: entry, isExpanded: false });
                    await scanDirectory(entry, itemPath);
                }
            }
        }

        async function openDirectory() {
            closeSettings();
            if (!('showDirectoryPicker' in window)) return showToast("このブラウザは未対応です");
            try {
                dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                showToast("読み込み中...");
                files = [];
                await scanDirectory(dirHandle, '');
                
                const firstIdx = files.findIndex(f => f.type === 'file');
                if (firstIdx >= 0) { files[firstIdx].isOpen = true; activeFileIndex = firstIdx; switchFile(firstIdx); }
                else { activeFileIndex = -1; switchFile(-1); }
                toggleSidebar(); showToast("ワークスペースを開きました");
            } catch (e) { if (e.name !== 'AbortError') showToast("読み込み失敗"); }
        }

        function getTargetDirectory() {
            if (activeFileIndex < 0 || !files[activeFileIndex]) return { path: '', handle: dirHandle };
            const activeItem = files[activeFileIndex];
            if (activeItem.type === 'folder') return { path: activeItem.path, handle: activeItem.handle || dirHandle };
            const parentPath = activeItem.path.substring(0, activeItem.path.lastIndexOf('/'));
            if (parentPath === '') return { path: '', handle: dirHandle };
            const parentFolder = files.find(f => f.type === 'folder' && f.path === parentPath);
            return { path: parentPath, handle: parentFolder ? parentFolder.handle : dirHandle };
        }

        function getParentDirectory(path) {
            const parentPath = path.substring(0, path.lastIndexOf('/'));
            if (parentPath === '') return { handle: dirHandle };
            return files.find(f => f.type === 'folder' && f.path === parentPath) || { handle: null };
        }

        async function createNewFile(defaultName = "") {
            const name = prompt("新規ファイル名を入力", defaultName || "utils.py");
            if (!name) return;
            const target = getTargetDirectory();
            const newPath = target.path + '/' + name;
            
            if (files.some(f => f.path === newPath)) return showToast("同名ファイルが存在します");
            
            let newHandle = null;
            if (target.handle && typeof target.handle.getFileHandle === 'function') {
                try { newHandle = await target.handle.getFileHandle(name, { create: true }); } 
                catch (e) { return showToast("作成エラー: " + e.message); }
            }
            
            files.push({ type: 'file', name: name, path: newPath, content: '', handle: newHandle, isDirty: false, isOpen: true });
            if (target.path) { const p = files.find(f => f.type === 'folder' && f.path === target.path); if (p) p.isExpanded = true; }
            
            activeFileIndex = files.length - 1;
            switchFile(activeFileIndex); saveVirtualFiles(); showToast(`${name} を作成しました`);
        }

        async function createNewFolder() {
            const name = prompt("新規フォルダ名を入力", "new_folder");
            if (!name) return;
            const target = getTargetDirectory();
            const newPath = target.path + '/' + name;

            if (files.some(f => f.path === newPath)) return showToast("同名フォルダが存在します");

            let newHandle = null;
            if (target.handle && typeof target.handle.getDirectoryHandle === 'function') {
                try { newHandle = await target.handle.getDirectoryHandle(name, { create: true }); } 
                catch (e) { return showToast("作成エラー: " + e.message); }
            }

            files.push({ type: 'folder', name: name, path: newPath, handle: newHandle, isExpanded: true });
            if (target.path) { const p = files.find(f => f.type === 'folder' && f.path === target.path); if (p) p.isExpanded = true; }
            
            renderSidebar(); saveVirtualFiles(); showToast(`${name} を作成しました`);
        }

        async function renameFile(index, event) {
            event.stopPropagation();
            const item = files[index];
            if (item.type === 'folder') return showToast("フォルダのリネームは未対応です");
            
            const newName = prompt("新しいファイル名を入力", item.name);
            if (!newName || newName === item.name) return;
            const newPath = item.path.substring(0, item.path.lastIndexOf('/')) + '/' + newName;
            
            if (item.handle) {
                try {
                    const parentHandle = getParentDirectory(item.path).handle || dirHandle;
                    if (parentHandle) {
                        const newHandle = await parentHandle.getFileHandle(newName, { create: true });
                        const writable = await newHandle.createWritable();
                        await writable.write(item.content); await writable.close();
                        await parentHandle.removeEntry(item.name);
                        item.handle = newHandle;
                    }
                } catch (e) { return showToast("リネーム失敗: " + e.message); }
            }
            
            item.name = newName; item.path = newPath;
            renderSidebar(); renderTabs(); saveVirtualFiles(); showToast("変更しました");
        }

        async function deleteFile(index, event) {
            event.stopPropagation();
            const item = files[index];
            if (!confirm(`${item.name} を削除しますか？`)) return;
            
            if (item.handle) {
                try {
                    const parentHandle = getParentDirectory(item.path).handle || dirHandle;
                    if (parentHandle) await parentHandle.removeEntry(item.name, { recursive: item.type === 'folder' });
                } catch (e) { showToast("ローカルファイルの削除失敗"); }
            }
            
            const prefix = item.path + '/';
            const toDelete = [index];
            if (item.type === 'folder') files.forEach((f, i) => { if (f.path.startsWith(prefix)) toDelete.push(i); });
            toDelete.sort((a,b)=>b-a).forEach(i => files.splice(i, 1));
            
            if (files.length === 0) {
                files.push({ type: 'file', name: 'main.py', path: '/main.py', content: '', handle: null, isDirty: false, isOpen: true });
                activeFileIndex = 0;
            } else if (!files[activeFileIndex] || files[activeFileIndex].type !== 'file' || !files[activeFileIndex].isOpen) {
                activeFileIndex = files.findIndex(f => f.type === 'file' && f.isOpen);
            }
            switchFile(activeFileIndex); saveVirtualFiles();
        }

        function toggleFolder(index) {
            if (files[index] && files[index].type === 'folder') { files[index].isExpanded = !files[index].isExpanded; renderSidebar(); saveVirtualFiles(); }
        }
        function openFile(index) {
            if (files[index] && files[index].type === 'file') { files[index].isOpen = true; switchFile(index); }
        }

        function renderSidebar() {
            const tree = document.getElementById('file-tree');
            let html = '';
            const sortedFiles = [...files].sort((a, b) => a.path.localeCompare(b.path));
            
            for (const f of sortedFiles) {
                const parts = f.path.split('/').filter(p => p); parts.pop();
                let isVisible = true, currentCheck = '';
                for (const part of parts) {
                    currentCheck += '/' + part;
                    const p = files.find(pf => pf.type === 'folder' && pf.path === currentCheck);
                    if (p && !p.isExpanded) { isVisible = false; break; }
                }
                if (!isVisible) continue;

                const indent = Math.max(0, (f.path.match(/\//g) || []).length - 1) * 15;
                const origIdx = files.findIndex(orig => orig.path === f.path);
                
                if (f.type === 'folder') {
                    html += `<div class="file-item" style="padding-left: ${indent + 6}px;" onclick="toggleFolder(${origIdx})">
                        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${f.isExpanded ? '📂' : '📁'} ${f.name}</span>
                        <div class="file-item-actions"><button class="btn-icon" style="font-size:14px; color:#ff6b6b; margin-left:5px;" onclick="deleteFile(${origIdx}, event)">✕</button></div>
                    </div>`;
                } else {
                    html += `<div class="file-item ${origIdx === activeFileIndex ? 'active' : ''}" style="padding-left: ${indent + 6}px;" onclick="openFile(${origIdx})">
                        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">📄 ${f.name}</span>
                        <div class="file-item-actions">
                            <button class="btn-icon" style="font-size:14px; color:#ccc; margin-left:5px;" onclick="renameFile(${origIdx}, event)">✏️</button>
                            <button class="btn-icon" style="font-size:14px; color:#ff6b6b; margin-left:5px;" onclick="deleteFile(${origIdx}, event)">✕</button>
                        </div>
                    </div>`;
                }
            }
            tree.innerHTML = html; renderTabs();
        }

        function renderTabs() {
            const tabs = document.getElementById('editor-tabs');
            tabs.innerHTML = files.map((f, i) => {
                if (f.type !== 'file' || !f.isOpen) return '';
                return `<div class="tab ${i === activeFileIndex ? 'active' : ''}" onclick="switchFile(${i})">
                    ${f.name} ${f.isDirty ? '<span style="color:var(--accent-blue)">*</span>' : ''}
                    <span class="close-btn" onclick="closeTab(${i}, event)">×</span>
                </div>`;
            }).join('');
            
            const cmWrapper = document.querySelector('.CodeMirror');
            if (cmWrapper) cmWrapper.style.display = activeFileIndex < 0 ? 'none' : 'block';
        }

        function closeTab(index, event) {
            event.stopPropagation();
            const file = files[index];
            if (file.isDirty && !confirm(`「${file.name}」には未保存の変更があります。破棄して閉じますか？`)) return;
            
            file.isOpen = false;
            if (activeFileIndex === index) {
                const nextIdx = files.findIndex(f => f.type === 'file' && f.isOpen);
                switchFile(nextIdx);
            } else renderTabs();
            saveVirtualFiles();
        }

        function switchFile(index) {
            if (activeFileIndex >= 0 && files[activeFileIndex] && files[activeFileIndex].type === 'file' && codeEditorInstance) {
                files[activeFileIndex].content = codeEditorInstance.getValue();
            }
            activeFileIndex = index;
            if (index >= 0 && files[index] && files[index].type === 'file' && codeEditorInstance) {
                codeEditorInstance.setValue(files[index].content); codeEditorInstance.clearHistory();
            } else if (codeEditorInstance) {
                codeEditorInstance.setValue(""); codeEditorInstance.clearHistory();
            }
            renderSidebar(); closeSidebar();
        }

        function saveToHistory(prompt, codeResult) {
            if (db) db.transaction('history', 'readwrite').objectStore('history').add({ date: new Date().toISOString(), prompt, code: codeResult });
        }
        function clearHistory() {
            if(confirm("履歴をすべて削除しますか？") && db) { db.transaction('history', 'readwrite').objectStore('history').clear(); showToast("削除しました"); closeSettings(); }
        }

        async function exportData() {
            try {
                closeSettings();
                const zip = new JSZip();
                if (activeFileIndex >= 0 && files[activeFileIndex] && files[activeFileIndex].type === 'file' && codeEditorInstance) {
                    files[activeFileIndex].content = codeEditorInstance.getValue();
                }
                files.forEach(f => { if (f.type === 'file' && f.name) zip.file(f.path.startsWith('/') ? f.path.substring(1) : f.path, f.content); });
                if (appSettings.pipPackages) zip.file("requirements.txt", appSettings.pipPackages);
                if (appSettings.envVars) zip.file(".env", appSettings.envVars);
                zip.file("ai_settings.json", JSON.stringify({ settings: appSettings, timestamp: new Date().toISOString() }, null, 2));

                const blob = await zip.generateAsync({type: "blob"});
                if ('showSaveFilePicker' in window) {
                    const handle = await window.showSaveFilePicker({ suggestedName: 'workspace_backup.zip', types: [{ description: 'ZIP Archive', accept: { 'application/zip': ['.zip'] } }] });

                } else {
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'workspace_backup.zip'; a.click(); showToast("ダウンロード開始");
                }

        async function importData() {
            closeSettings();
            if ('showOpenFilePicker' in window) {
                try {
                    const [handle] = await window.showOpenFilePicker({ types: [{ description: 'テキスト/JSON/Python', accept: { 'text/*': ['.txt', '.md', '.py', '.env'], 'application/json': ['.json'] } }] });
                    const file = await handle.getFile(); processImportedText(file.name, await file.text());
                } catch (err) { if(err.name !== 'AbortError') showToast("読み込み失敗"); }
            } else {
                const input = document.createElement('input'); input.type = 'file'; input.accept = '.json,.txt,.md,.py,.env';
                input.onchange = e => {
                    const file = e.target.files[0]; if(!file) return;
                    const reader = new FileReader(); reader.onload = re => processImportedText(file.name, re.target.result); reader.readAsText(file);
                };
                input.click();
            }
        }

        function processImportedText(filename, text) {
            if (filename.endsWith('.json') && !filename.includes('settings')) { try { const data = JSON.parse(text); if(data.code) text = data.code; } catch(err) { } }
            if (activeFileIndex >= 0 && files[activeFileIndex].type === 'file') {
                codeEditorInstance.setValue(text); files[activeFileIndex].content = text; saveCurrentFile(); showToast("現在のタブに読み込みました");
            } else {
                files.push({ type: 'file', name: filename, path: '/' + filename, content: text, handle: null, isDirty: false, isOpen: true });
                activeFileIndex = files.length - 1; switchFile(activeFileIndex); saveVirtualFiles(); showToast(`${filename} を読み込みました`);
            }
        }

        CodeMirror.commands.autocomplete = function(cm) {
            CodeMirror.showHint(cm, function(cm, options) {
                const cur = cm.getCursor(), curLine = cm.getLine(cur.line);
                let matchStart = cur.ch; while (matchStart && /[\w$]+/.test(curLine.charAt(matchStart - 1))) --matchStart;
                const curWord = matchStart != cur.ch && curLine.slice(matchStart, cur.ch);
                const pyKw = ["def", "class", "import", "from", "for", "while", "if", "elif", "else", "return", "True", "False", "None", "print", "self"];
                let list = curWord ? pyKw.filter(k => k.startsWith(curWord)) : [];
                const anyRes = CodeMirror.hint.anyword(cm, options);
                if (anyRes && anyRes.list) list = [...new Set([...list, ...anyRes.list])];
                return {list: list, from: CodeMirror.Pos(cur.line, matchStart), to: CodeMirror.Pos(cur.line, cur.ch)};
            }, {completeSingle: false});
        };

        let pyodide;
        let installedPackages = new Set(['micropip', 'pyodide', 'js', 'pyodide_js', 'sys', 'os', 'io', 'math', 'json', 're', 'time', 'datetime', 'random', 'collections']);
        const IMPORT_TO_PACKAGE = { 'sklearn': 'scikit-learn', 'cv2': 'opencv-python', 'PIL': 'Pillow', 'bs4': 'beautifulsoup4', 'yaml': 'pyyaml' };

        window.onload = async () => {
            codeEditorInstance = CodeMirror.fromTextArea(document.getElementById('code'), {
                mode: "python", theme: "darcula", lineNumbers: true, indentUnit: 4, matchBrackets: true, autoCloseBrackets: true, lineWrapping: true,
                extraKeys: { "Ctrl-Space": "autocomplete", "Cmd-/": "toggleComment", "Ctrl-/": "toggleComment" }
            });
            codeEditorInstance.on("inputRead", (cm, change) => { if (change.text[0].match(/[a-zA-Z_]/)) CodeMirror.commands.autocomplete(cm); });
            codeEditorInstance.on('change', () => {
                if (activeFileIndex >= 0 && files[activeFileIndex] && files[activeFileIndex].type === 'file') {
                    files[activeFileIndex].content = codeEditorInstance.getValue();
                    if (!files[activeFileIndex].isDirty) { files[activeFileIndex].isDirty = true; renderTabs(); }
                    clearTimeout(autoSaveTimer); autoSaveTimer = setTimeout(saveCurrentFile, 2000);
                }
            });

            const cmWrapper = codeEditorInstance.getWrapperElement();
            cmWrapper.addEventListener('touchstart', onTouchStart, {passive: true});
            cmWrapper.addEventListener('touchmove', onTouchMove, {passive: true});
            cmWrapper.addEventListener('touchend', onTouchEnd, {passive: true});

            await init();

        async function init() {
            await initDB();
            const statusText = document.getElementById('status-text');
            try {
                statusText.innerHTML = "<span class='loader'></span> PyodideコアDL中...";
                pyodide = await loadPyodide();
                statusText.innerHTML = "<span class='loader'></span> micropip準備中...";
                await pyodide.loadPackage("micropip");
                statusText.innerHTML = "システム: 準備完了 ✅"; statusText.style.color = "#4CAF50"; showToast("Python準備完了！");
            } catch (err) {
                statusText.innerText = "システム: エラー発生"; document.getElementById('output').innerText = err.message; document.getElementById('output').style.color = "#ff6b6b"; pyodide = null;
            }

        async function formatCode() {
            if (activeFileIndex < 0) return showToast("ファイルが開かれていません");
            if (!pyodide) return showToast("Python環境が準備中かエラーです");
            const code = codeEditorInstance.getValue(); if (!code.trim()) return;
            const statusText = document.getElementById('status-text');
            statusText.innerHTML = "<span class='loader'></span> コード整形中...";
            try {
                if (!installedPackages.has('black')) { await pyodide.pyimport("micropip").install('black'); installedPackages.add('black'); }
                pyodide.globals.set("code_to_format", code);
                await pyodide.runPythonAsync(`import black\ntry:\n  formatted_code = black.format_str(code_to_format, mode=black.FileMode())\nexcept:\n  formatted_code = code_to_format`);
                const fCode = pyodide.globals.get("formatted_code");
                if (fCode !== code) { codeEditorInstance.setValue(fCode); saveCurrentFile(); showToast("整形しました"); } else showToast("整形済みかエラーです");
                statusText.innerText = "システム: 準備完了 ✅";
            } catch (e) { showToast("整形エラー"); statusText.innerText = "システム: エラー"; }
        }

        function detectImports(code) {
            const imports = new Set();
            for (const line of code.split('\n')) {
                let m = line.trim().match(/^(import|from)\s+([a-zA-Z0-9_]+)/);
                if (m) imports.add(m[2]);
            }
            return Array.from(imports).filter(mod => !installedPackages.has(mod));
        }

        async function autoInstallPackages(packages, statusText) {
            if (packages.length === 0) return;
            const micropip = pyodide.pyimport("micropip");
            for (const mod of packages) {
                if (installedPackages.has(mod)) continue;
                const pipName = IMPORT_TO_PACKAGE[mod] || mod;
                statusText.innerHTML = "<span class='loader'></span> " + pipName + " をインストール中...";
                try { await pyodide.loadPackage(mod); installedPackages.add(mod); }
                catch (e) { try { await micropip.install(pipName); installedPackages.add(mod); installedPackages.add(pipName); } catch (e2) {} }
            }
        }

        async function runPython() {
            if (activeFileIndex < 0) return showToast("実行するファイルがありません");
            if (files[activeFileIndex].type === 'file') { files[activeFileIndex].content = codeEditorInstance.getValue(); saveVirtualFiles(); }
            if (!pyodide) return showToast("Python環境が準備できていません。");

            const code = codeEditorInstance.getValue(), outDiv = document.getElementById('output'), stText = document.getElementById('status-text');
            stText.innerHTML = "<span class='loader'></span> 環境構築中..."; outDiv.innerText = ""; outDiv.style.color = "var(--text-color)";
            try {
                const allPkgs = Array.from(new Set([...detectImports(code), ...appSettings.pipPackages.split('\n').map(l => l.trim()).filter(l => l)]));
                if (allPkgs.length > 0) await autoInstallPackages(allPkgs, stText);
                if (appSettings.envVars) await pyodide.runPythonAsync('import os\n' + appSettings.envVars.split('\n').filter(l=>l.includes('=')).map(l=>`os.environ["${l.split('=')[0].trim()}"] = """${l.split('=').slice(1).join('=').trim()}"""`).join('\n'));

                stText.innerHTML = "<span class='loader'></span> コード実行中...";
                await pyodide.runPythonAsync("import sys, io\nsys.stdout = io.StringIO()\nsys.stderr = io.StringIO()");
                await pyodide.runPythonAsync(code);
                const stdout = await pyodide.runPythonAsync("sys.stdout.getvalue()"), stderr = await pyodide.runPythonAsync("sys.stderr.getvalue()");
                if (stdout) outDiv.innerText += stdout;
                if (stderr) { outDiv.innerText += "\n[Error]\n" + stderr; outDiv.style.color = "#ff6b6b"; stText.innerText = "システム: エラー終了"; }
                else { stText.innerText = "システム: 実行完了 ✅"; showToast("実行完了"); }
            } catch (err) { outDiv.innerText = "実行エラー:\n" + err.message; outDiv.style.color = "#ff6b6b"; stText.innerText = "システム: エラー"; }
        }

        function stripCodeFences(text) { return text.replace(/```python\s*/gi, '').replace(/```\s*/g, '').trim(); }

        async function callGeminiAPI(apiKey, model, prompt, sys, code) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ system_instruction: { parts: [{text: sys}] }, contents: [{ parts: [{ text: "現在のファイル内容:\n\n" + code + "\n\n指示:\n" + prompt }] }] })
            });
            const data = await res.json(); if (data.error) throw new Error(data.error.message);
            return stripCodeFences(data.candidates[0].content.parts[0].text);
        }

        async function callOpenAIAPI(apiKey, model, prompt, sys, code) {
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: model, messages: [{role: "system", content: sys}, {role: "user", content: "現在のファイル内容:\n\n" + code + "\n\n指示:\n" + prompt}] })
            });
            const data = await res.json(); if (data.error) throw new Error(data.error.message);
            return stripCodeFences(data.choices[0].message.content);
        }

        async function askAI() {
            if (activeFileIndex < 0) return showToast("AIを適用するファイルがありません");
            const fullCode = codeEditorInstance.getValue(), lines = fullCode.split('\n');
            let targetIdx = -1, aiPromptText = "";
            for (let i = 0; i < lines.length; i++) { if (lines[i].trim().startsWith('# AI:')) { targetIdx = i; aiPromptText = lines[i].replace('# AI:', '').trim(); break; } }
            
            const finalPrompt = aiPromptText || document.getElementById('ai-prompt').value;
            if (!finalPrompt) return showToast("指示を入力するか '# AI: 指示' を記述してください");
            
            document.getElementById('status-text').innerHTML = "<span class='loader'></span> AI生成中...";
            document.getElementById('btn-ai').disabled = true; requestWakeLock();
            
            try {
                let res; const activeModel = appSettings.customModel || appSettings.model;
                if (appSettings.apiKey && activeModel.includes('gemini')) res = await callGeminiAPI(appSettings.apiKey, activeModel, finalPrompt, appSettings.systemPrompt, fullCode);
                else if (appSettings.apiKey && (activeModel.includes('gpt') || activeModel.includes('grok'))) res = await callOpenAIAPI(appSettings.apiKey, activeModel, finalPrompt, appSettings.systemPrompt, fullCode);
                else { await new Promise(r => setTimeout(r, 1500)); res = '# APIキー未設定です\nprint("Success")'; }

                if (targetIdx !== -1) { lines.splice(targetIdx + 1, 0, res); codeEditorInstance.setValue(lines.join('\n')); }
                else codeEditorInstance.setValue(fullCode + '\n\n' + res);
                
                saveCurrentFile(); saveToHistory(finalPrompt, res);
                document.getElementById('status-text').innerText = "システム: 生成完了 ✅"; showToast("AIコード生成完了");
            } catch (err) {
                document.getElementById('status-text').innerText = "システム: AIエラー"; showToast("APIエラー: " + err.message);
            } finally { releaseWakeLock(); document.getElementById('btn-ai').disabled = false; }
        }
    </script>
